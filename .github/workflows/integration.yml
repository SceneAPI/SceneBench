name: Integration

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional live sceneapi base URL for API-surface checks."
        required: false
        default: ""
  schedule:
    - cron: "19 8 * * 1"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SceneAPI/SceneAPI
          path: .deps/sceneapi
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv venv --seed
          uv pip install -e .deps/sceneapi
          uv pip install pytest ruff build
          uv pip install -e . --no-deps
      - name: Validate benchmark utilities
        run: |
          .venv/bin/scenebench geometry-check
          .venv/bin/scenebench list-datasets
      - name: Check live API surface
        if: github.event_name == 'workflow_dispatch' && inputs.base_url != ''
        run: .venv/bin/scenebench api-surface --base-url "${{ inputs.base_url }}" --preset generic
